# ═══════════════════════════════════════════════════════
# Nginx — Worker Node (external API + WebSocket)
# Optimized for: high API throughput, large payloads, WS
# ═══════════════════════════════════════════════════════

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    # ── Core ──
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 120;
    keepalive_requests 10000;
    types_hash_max_size 2048;
    server_tokens off;

    # ── Buffers (larger for API payloads) ──
    client_body_buffer_size 64k;
    client_header_buffer_size 4k;
    large_client_header_buffers 8 16k;
    client_max_body_size 100m;

    # ── Timeouts ──
    client_body_timeout 60;
    client_header_timeout 30;
    send_timeout 60;
    proxy_connect_timeout 10;
    proxy_send_timeout 120;
    proxy_read_timeout 120;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        text/csv;

    # ── Rate Limiting ──
    limit_req_zone $binary_remote_addr zone=api:20m rate=200r/s;
    limit_req_zone $binary_remote_addr zone=api_write:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=graphql:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=addr:20m;
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # ── Upstream with keepalive pool ──
    upstream worker_backend {
        server worker-backend:4001;
        keepalive 64;
    }

    # ── Response cache for GET endpoints ──
    proxy_cache_path /var/cache/nginx/worker levels=1:2 keys_zone=worker_cache:20m max_size=500m inactive=5m;

    server {
        listen 80;
        server_name eu.dataforge.io localhost;

        # ── Security Headers ──
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── CORS (configurable per deployment) ──
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key, X-Session-Key" always;
        add_header Access-Control-Max-Age 86400 always;

        # Preflight
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ── S&box Auth routes (game login — separate rate limit) ──
        location ~ ^/api/v1/[^/]+/sbox_ {
            limit_req zone=auth burst=20 nodelay;
            limit_conn addr 20;
            proxy_pass http://worker_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── GraphQL (separate rate limit) ──
        location ~ ^/api/v1/[^/]+/graphql$ {
            limit_req zone=graphql burst=50 nodelay;
            proxy_pass http://worker_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Swagger docs (cacheable, public) ──
        location ~ ^/api/v1/[^/]+/docs {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://worker_backend;
            proxy_cache worker_cache;
            proxy_cache_valid 200 5m;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Public API (main traffic) ──
        location /api/ {
            limit_req zone=api burst=400 nodelay;
            limit_conn addr 100;
            proxy_pass http://worker_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 16 32k;
        }

        # ── Public Forms ──
        location /forms/ {
            limit_req zone=api_write burst=50 nodelay;
            proxy_pass http://worker_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── WebSocket ──
        location /ws/ {
            limit_conn ws_conn 200;
            proxy_pass http://worker_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # ── Health ──
        location /health {
            access_log off;
            proxy_pass http://worker_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Block internal routes from outside ──
        location /internal/ {
            deny all;
            return 403;
        }

        # ── Nginx health ──
        location /nginx-health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }
    }
}
