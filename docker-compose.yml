services:
  postgres-control:
    image: postgres:16-alpine
    container_name: df-postgres-control
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_CONTROL_USER:-dataforge}
      POSTGRES_PASSWORD: ${POSTGRES_CONTROL_PASSWORD:?Set POSTGRES_CONTROL_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_CONTROL_DB:-dataforge_control}
    expose:
      - "5432"
    volumes:
      - pg_control:/var/lib/postgresql/data
      - ./config/postgres-control.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    shm_size: 256mb
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: df-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M

  control-backend:
    build:
      context: .
      dockerfile: control-plane/backend/Dockerfile
    container_name: df-control-backend
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_CONTROL_USER:-dataforge}:${POSTGRES_CONTROL_PASSWORD}@postgres-control:5432/${POSTGRES_CONTROL_DB:-dataforge_control}
      DATABASE_POOL_MIN: 5
      DATABASE_POOL_MAX: 30
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      BCRYPT_ROUNDS: 12
      ADMIN_EMAIL: ${ADMIN_EMAIL:?Set ADMIN_EMAIL in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      ADMIN_NAME: ${ADMIN_NAME:-Superadmin}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY:?Set SECRETS_ENCRYPTION_KEY in .env}
      WORKER_NODE_API_KEY: ${WORKER_NODE_API_KEY:?Set WORKER_NODE_API_KEY in .env}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
      CORS_ORIGIN: ${CORS_ORIGIN:?Set CORS_ORIGIN in .env}
      RATE_LIMIT_MAX: 200
      RATE_LIMIT_WINDOW: 60000
    depends_on:
      postgres-control:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backups_data:/app/backups
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M

  control-frontend:
    build:
      context: .
      dockerfile: control-plane/frontend/Dockerfile
    container_name: df-control-frontend
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M

  nginx-control:
    image: nginx:alpine
    container_name: df-nginx-control
    restart: unless-stopped
    ports:
      - "${CP_PORT:-80}:80"
    volumes:
      - ./control-plane/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache_cp:/var/cache/nginx/cp
    depends_on:
      control-backend:
        condition: service_healthy
      control-frontend:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  backend:
    driver: bridge

volumes:
  pg_control:
  redis_data:
  backups_data:
  nginx_cache_cp:
