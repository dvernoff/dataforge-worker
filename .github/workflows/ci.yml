name: Build & Deploy CP

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build-cp-backend:
    name: CP Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: control-plane/backend
      - name: Type check
        run: npx tsc --noEmit
        working-directory: control-plane/backend
        continue-on-error: true

  build-cp-frontend:
    name: CP Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts 2>/dev/null || true
        working-directory: shared
      - run: npm ci
        working-directory: control-plane/frontend
      - run: npx vite build
        working-directory: control-plane/frontend

  docker:
    name: Push Docker Images
    needs: [build-cp-backend, build-cp-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: CP Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: control-plane/backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/cp-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: CP Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: control-plane/frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/cp-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
