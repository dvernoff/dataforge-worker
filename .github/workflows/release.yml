name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build & push CP Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: control-plane/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/cp-backend:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository }}/cp-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push CP Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: control-plane/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/cp-frontend:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository }}/cp-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: worker-node/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/worker:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository }}/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
