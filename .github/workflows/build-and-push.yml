name: Build and Push

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push CP Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: control-plane/backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/cp-backend:${{ steps.meta.outputs.version }},ghcr.io/${{ github.repository }}/cp-backend:latest

      - name: Build and push CP Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: control-plane/frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/cp-frontend:${{ steps.meta.outputs.version }},ghcr.io/${{ github.repository }}/cp-frontend:latest

      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: worker-node/backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/worker:${{ steps.meta.outputs.version }},ghcr.io/${{ github.repository }}/worker:latest
