# ═══════════════════════════════════════════════════════
# Nginx — Control Plane (UI + API proxy)
# Optimized for: static assets, API proxying, WebSocket
# ═══════════════════════════════════════════════════════

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Core ──
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # ── Buffers ──
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    client_max_body_size 50m;

    # ── Timeouts ──
    client_body_timeout 30;
    client_header_timeout 30;
    send_timeout 30;
    proxy_connect_timeout 10;
    proxy_send_timeout 60;
    proxy_read_timeout 60;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Rate Limiting ──
    limit_req_zone $binary_remote_addr zone=global:20m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=api:20m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=addr:20m;

    # ── Upstreams ──
    upstream control_backend {
        server control-backend:4000;
        keepalive 32;
    }

    upstream control_frontend {
        server control-frontend:3000;
        keepalive 16;
    }

    # ── Proxy cache (for static/read-heavy endpoints) ──
    proxy_cache_path /var/cache/nginx/cp levels=1:2 keys_zone=cp_cache:10m max_size=100m inactive=10m;

    server {
        listen 80;
        server_name app.dataforge.io localhost;

        # ── Security Headers ──
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Auth routes (strict rate limit) ──
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            limit_conn addr 10;
            proxy_pass http://control_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── API routes ──
        location /api/ {
            limit_req zone=api burst=100 nodelay;
            limit_conn addr 50;
            proxy_pass http://control_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 16k;
        }

        # ── Internal routes (node heartbeat, registration) ──
        location /internal/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://control_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Frontend (SPA with cache) ──
        location /assets/ {
            proxy_pass http://control_frontend;
            proxy_cache cp_cache;
            proxy_cache_valid 200 1h;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            limit_req zone=global burst=200 nodelay;
            proxy_pass http://control_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }

        # ── Health check ──
        location /nginx-health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }
    }
}
