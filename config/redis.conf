# ═══════════════════════════════════════════════════════
# Redis 7 — Shared Cache + Sessions + Rate Limiting
# Optimized for: high throughput, low latency, many keys
# ═══════════════════════════════════════════════════════

# ── Network ──
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 60

# ── Memory ──
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 10

# ── Persistence (RDB snapshots — good balance of safety + speed) ──
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ── AOF (append-only file for crash recovery) ──
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── Performance ──
hz 10
dynamic-hz yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes

# ── Clients ──
maxclients 10000

# ── Slow Log ──
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── Latency Monitor ──
latency-monitor-threshold 100

# ── Security ──
# Пароль задаётся через docker-compose command: --requirepass $REDIS_PASSWORD
# НЕ добавляйте requirepass здесь — будет конфликт
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
