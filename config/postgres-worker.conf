# ═══════════════════════════════════════════════════════
# PostgreSQL 16 — Worker Node (project data, heavy CRUD)
# Optimized for: high throughput, large datasets, bulk ops
# ═══════════════════════════════════════════════════════

# ── Connections ──
max_connections = 500
superuser_reserved_connections = 5

# ── Memory (tuned for data-heavy workloads) ──
shared_buffers = 512MB
effective_cache_size = 1536MB
work_mem = 16MB
maintenance_work_mem = 256MB
wal_buffers = 32MB
huge_pages = try

# ── WAL / Durability ──
wal_level = replica
max_wal_size = 2GB
min_wal_size = 512MB
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
wal_compression = lz4

# ── Query Planner ──
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 200

# ── Parallel Queries (more aggressive for analytics) ──
max_worker_processes = 8
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# ── JIT (for complex queries / analytics) ──
jit = on
jit_above_cost = 100000

# ── Partitioning ──
enable_partition_pruning = on

# ── Logging ──
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0
log_statement = none

# ── Autovacuum (aggressive — Worker has heavy INSERT/UPDATE/DELETE) ──
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 15s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_limit = 1000

# ── Bulk Operations ──
temp_buffers = 32MB
max_locks_per_transaction = 256

# ── Network ──
listen_addresses = '*'
tcp_keepalives_idle = 60
tcp_keepalives_interval = 10
tcp_keepalives_count = 6

# ── Locale ──
timezone = 'UTC'
lc_messages = 'en_US.utf8'
